<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BFT Tracker">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>BFT PXI Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #f1f5f9;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }
    
    #root {
      width: 100%;
      min-height: 100vh;
    }
    
    input::placeholder {
      color: #64748b;
    }
    
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(37, 149, 190, 0.3);
      border-radius: 16px;
      padding: 24px;
      max-width: 400px;
      width: 100%;
      backdrop-filter: blur(10px);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(239, 68, 68, 0.2);
      border: none;
      color: #ef4444;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 18px;
    }

    .modal-close:hover {
      background: rgba(239, 68, 68, 0.3);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // ============================================================================
    // CONFIG & CONSTANTS
    // ============================================================================
    
    const CONFIG = {
      TARGET_PXI: 1800,
    };

    const COLORS = {
      primary: '#2595be',
      primaryLight: '#4fafc4',
      success: '#22c55e',
      successLight: '#4ade80',
      warning: '#eab308',
      warningLight: '#facc15',
      danger: '#ef4444',
      text: '#f1f5f9',
      textMuted: '#94a3b8',
      border: '#64748b',
      dark: '#0f172a',
      darkAlt: '#1e293b',
    };

    // ============================================================================
    // STATE MANAGEMENT
    // ============================================================================
    
    let state = {
      currentDate: new Date(),
      sessions: [],
      selectedDate: null,
      modalMode: null,
      inputPXI: '',
      showModal: false,
    };

    // Load sessions from localStorage
    function loadSessions() {
      try {
        const saved = localStorage.getItem('bftSessions');
        if (saved) {
          const parsed = JSON.parse(saved);
          state.sessions = parsed.filter(s => s.date) || [];
        }
      } catch (e) {
        console.log('Error loading sessions:', e);
      }
    }

    // Save sessions to localStorage
    function saveSessions() {
      try {
        localStorage.setItem('bftSessions', JSON.stringify(state.sessions));
      } catch (e) {
        console.log('localStorage unavailable');
      }
    }

    // ============================================================================
    // HELPER FUNCTIONS
    // ============================================================================

    const formatDate = (year, month, day) => {
      return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    };

    const isSessionInMonth = (session, year, month) => {
      return session.date.startsWith(`${year}-${String(month + 1).padStart(2, '0')}`);
    };

    const getSessionsForMonth = (sessions, year, month) => {
      return sessions.filter(s => isSessionInMonth(s, year, month));
    };

    const calculateStats = (sessions, year, month) => {
      const monthSessions = getSessionsForMonth(sessions, year, month);
      
      const totalPXI = monthSessions
        .filter(s => typeof s.pxi === 'number')
        .reduce((sum, s) => sum + s.pxi, 0);

      const completedSessions = monthSessions.filter(s => s.pxi).length;
      const plannedSessions = monthSessions.filter(s => !s.pxi).length;

      const remainingPXI = Math.max(0, CONFIG.TARGET_PXI - totalPXI);
      const pendingSessions = plannedSessions;
      const avgNeeded = pendingSessions > 0 ? Math.ceil(remainingPXI / pendingSessions) : 0;
      const targetReached = totalPXI >= CONFIG.TARGET_PXI;

      return {
        totalPXI,
        remainingPXI,
        completedSessions,
        plannedSessions,
        totalPlannedForMonth: completedSessions + plannedSessions,
        pendingSessions,
        avgNeeded,
        targetReached,
      };
    };

    const getCalendarDays = (year, month) => {
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysArray = [];
      
      for (let i = 0; i < firstDay; i++) {
        daysArray.push(null);
      }
      for (let i = 1; i <= daysInMonth; i++) {
        daysArray.push(i);
      }
      
      return daysArray;
    };

    const getSessionForDate = (day) => {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      const dateStr = formatDate(year, month, day);
      return state.sessions.find(s => s.date === dateStr);
    };

    // ============================================================================
    // EVENT HANDLERS
    // ============================================================================

    function handleDateClick(day) {
      if (!day) return;
      state.selectedDate = day;
      state.showModal = true;
      state.modalMode = null;
      const session = getSessionForDate(day);
      state.inputPXI = session && session.pxi ? session.pxi.toString() : '';
      render();
    }

    function handleAddPlannedSession(day) {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      const dateStr = formatDate(year, month, day);
      const existingIndex = state.sessions.findIndex(s => s.date === dateStr);
      
      if (existingIndex > -1 && !state.sessions[existingIndex].pxi) {
        state.sessions.splice(existingIndex, 1);
      } else if (existingIndex === -1) {
        state.sessions.push({ id: Date.now(), date: dateStr });
      }
      saveSessions();
    }

    function handleSaveSession() {
      if (!state.selectedDate || !state.modalMode) return;
      
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      const dateStr = formatDate(year, month, state.selectedDate);
      const existingIndex = state.sessions.findIndex(s => s.date === dateStr);
      
      if (state.modalMode === 'logged') {
        if (!state.inputPXI || isNaN(state.inputPXI)) return;
        
        const pxiValue = Number(state.inputPXI);
        
        if (existingIndex > -1) {
          state.sessions[existingIndex].pxi = pxiValue;
        } else {
          state.sessions.push({ id: Date.now(), date: dateStr, pxi: pxiValue });
        }
      }
      
      saveSessions();
      closeModal();
    }

    function handleRemoveSession() {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      const dateStr = formatDate(year, month, state.selectedDate);
      state.sessions = state.sessions.filter(s => s.date !== dateStr);
      saveSessions();
      closeModal();
    }

    function closeModal() {
      state.showModal = false;
      state.selectedDate = null;
      state.inputPXI = '';
      state.modalMode = null;
      render();
    }

    function handlePreviousMonth() {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      state.currentDate = new Date(year, month - 1, 1);
      render();
    }

    function handleNextMonth() {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      state.currentDate = new Date(year, month + 1, 1);
      render();
    }

    // ============================================================================
    // RENDER
    // ============================================================================

    function render() {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      const monthString = state.currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
      
      const stats = calculateStats(state.sessions, year, month);
      const progressPercent = Math.min(100, (stats.totalPXI / CONFIG.TARGET_PXI) * 100);
      const daysArray = getCalendarDays(year, month);
      const sessionForSelectedDate = state.selectedDate ? getSessionForDate(state.selectedDate) : null;

      const root = document.getElementById('root');
      root.innerHTML = `
        <div style="background: linear-gradient(135deg, ${COLORS.dark} 0%, ${COLORS.darkAlt} 100%); min-height: 100vh; color: ${COLORS.text}; padding: 20px; padding-top: 32px;">
          
          <!-- Header -->
          <div style="margin-bottom: 28px; text-align: center;">
            <div style="font-size: 13px; font-weight: 500; color: ${COLORS.textMuted}; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;">
              BFT Monthly Tracker
            </div>
            <h1 style="font-size: 36px; font-weight: 700; margin: 0; background: linear-gradient(135deg, ${COLORS.primaryLight} 0%, #ffffff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
              ${monthString}
            </h1>
          </div>

          <!-- Stats Grid -->
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px;">
            <!-- Progress Circle -->
            <div style="background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(37, 149, 190, 0.2); border-radius: 20px; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); position: relative; overflow: hidden;">
              <svg width="140" height="140" viewBox="0 0 140 140" style="transform: rotate(-90deg);">
                <circle cx="70" cy="70" r="60" fill="none" stroke="rgba(37, 149, 190, 0.1)" stroke-width="8" />
                <circle cx="70" cy="70" r="60" fill="none" stroke="url(#grad)" stroke-width="8" stroke-dasharray="${(progressPercent / 100) * 376.99} 376.99" style="transition: stroke-dasharray 0.6s ease;" />
                <defs>
                  <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="${COLORS.primary}" />
                    <stop offset="100%" stop-color="${COLORS.primaryLight}" />
                  </linearGradient>
                </defs>
              </svg>
              <div style="position: absolute; text-align: center;">
                <div style="font-size: 28px; font-weight: 700; color: ${COLORS.primary};">
                  ${stats.totalPXI}
                </div>
                <div style="font-size: 12px; color: ${COLORS.textMuted};">of ${CONFIG.TARGET_PXI}</div>
              </div>
            </div>

            <!-- Right stats -->
            <div style="display: flex; flex-direction: column; gap: 12px;">
              <!-- Remaining -->
              <div style="background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(37, 149, 190, 0.2); border-radius: 16px; padding: 16px; backdrop-filter: blur(10px);">
                <div style="font-size: 12px; color: ${COLORS.textMuted}; margin-bottom: 4px;">Remaining</div>
                <div style="font-size: 24px; font-weight: 700; color: ${stats.targetReached ? COLORS.success : COLORS.primary};">
                  ${stats.targetReached ? '✓ Done!' : stats.remainingPXI}
                </div>
              </div>

              <!-- Sessions -->
              <div style="background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(37, 149, 190, 0.2); border-radius: 16px; padding: 16px; backdrop-filter: blur(10px);">
                <div style="font-size: 12px; color: ${COLORS.textMuted}; margin-bottom: 4px;">Sessions</div>
                <div style="font-size: 18px; font-weight: 600;">
                  <span style="color: ${COLORS.success};">${stats.completedSessions}</span>
                  <span style="color: ${COLORS.border};"> / </span>
                  <span style="color: ${COLORS.warning};">${stats.totalPlannedForMonth}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Avg Needed Card -->
          ${stats.pendingSessions > 0 ? `
            <div style="background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(34, 197, 94, 0.05) 100%); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 16px; padding: 20px; margin-bottom: 28px; backdrop-filter: blur(10px); text-align: center;">
              <div style="font-size: 12px; color: ${COLORS.success}; font-weight: 600; margin-bottom: 8px;">
                AVG PXI PER SESSION
              </div>
              <div style="font-size: 32px; font-weight: 700; color: ${COLORS.success};">
                ${stats.avgNeeded}
              </div>
              <div style="font-size: 12px; color: ${COLORS.textMuted}; margin-top: 4px;">
                for ${stats.pendingSessions} remaining session${stats.pendingSessions !== 1 ? 's' : ''}
              </div>
            </div>
          ` : ''}

          <!-- Calendar -->
          <div style="background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(37, 149, 190, 0.2); border-radius: 16px; padding: 24px; backdrop-filter: blur(10px);">
            <!-- Header -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
              <button onclick="window.handlePreviousMonth()" style="background: rgba(37, 149, 190, 0.2); border: 1px solid rgba(37, 149, 190, 0.3); color: ${COLORS.primary}; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s;">
                ← Prev
              </button>
              <h2 style="font-size: 16px; font-weight: 600; margin: 0; flex: 1; text-align: center;">
                ${monthString}
              </h2>
              <button onclick="window.handleNextMonth()" style="background: rgba(37, 149, 190, 0.2); border: 1px solid rgba(37, 149, 190, 0.3); color: ${COLORS.primary}; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s;">
                Next →
              </button>
            </div>

            <!-- Day Headers -->
            <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 12px;">
              ${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => 
                `<div style="text-align: center; font-size: 12px; font-weight: 600; color: ${COLORS.border}; padding: 8px;">${day}</div>`
              ).join('')}
            </div>

            <!-- Calendar Grid -->
            <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;">
              ${daysArray.map((day, idx) => {
                const session = day ? getSessionForDate(day) : null;
                const isLogged = session && session.pxi;
                const isPlanned = session && !session.pxi;
                
                const bgColor = day ? (
                  isLogged 
                    ? 'linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(74, 222, 128, 0.1) 100%)'
                    : isPlanned
                    ? 'linear-gradient(135deg, rgba(234, 179, 8, 0.2) 0%, rgba(250, 204, 21, 0.1) 100%)'
                    : 'rgba(71, 85, 105, 0.2)'
                ) : 'transparent';

                const borderColor = day ? (
                  isLogged
                    ? '2px solid rgba(34, 197, 94, 0.6)'
                    : isPlanned
                    ? '2px solid rgba(234, 179, 8, 0.6)'
                    : '1px solid rgba(71, 85, 105, 0.3)'
                ) : 'none';

                return `
                  <div onclick="${day ? `window.handleDateClick(${day})` : ''}" style="aspect-ratio: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; background: ${bgColor}; border: ${borderColor}; border-radius: 8px; cursor: ${day ? 'pointer' : 'default'}; transition: all 0.2s; position: relative; overflow: hidden;">
                    ${day ? `
                      <div style="font-size: 14px; font-weight: 600; color: ${COLORS.text};">
                        ${day}
                      </div>
                      ${isLogged ? `
                        <div style="font-size: 10px; font-weight: 700; color: ${COLORS.success}; background: rgba(34, 197, 94, 0.4); padding: 2px 6px; border-radius: 4px;">
                          ${session.pxi}
                        </div>
                      ` : ''}
                      ${isPlanned ? `
                        <div style="font-size: 9px; font-weight: 700; color: ${COLORS.warning}; background: rgba(234, 179, 8, 0.4); padding: 2px 4px; border-radius: 3px;">
                          PLANNED
                        </div>
                      ` : ''}
                    ` : ''}
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>

        <!-- Modal -->
        <div id="modal" class="modal ${state.showModal ? 'show' : ''}">
          <div class="modal-content">
            <button class="modal-close" onclick="window.closeModal()">✕</button>
            
            <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 20px; margin-top: 0;">
              ${state.selectedDate ? `${monthString} ${state.selectedDate}` : 'Add Session'}
            </h3>

            ${!state.modalMode ? `
              <div style="display: flex; flex-direction: column; gap: 8px;">
                ${!sessionForSelectedDate ? `
                  <button onclick="window.setModalMode('logged')" style="flex: 1; padding: 16px; background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(74, 222, 128, 0.1) 100%); border: 2px solid rgba(34, 197, 94, 0.4); color: ${COLORS.success}; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px;">
                    Log PXI
                  </button>
                  <button onclick="window.handleAddPlannedSessionFromModal()" style="flex: 1; padding: 16px; background: linear-gradient(135deg, rgba(234, 179, 8, 0.2) 0%, rgba(250, 204, 21, 0.1) 100%); border: 2px solid rgba(234, 179, 8, 0.4); color: ${COLORS.warning}; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px;">
                    Plan Session
                  </button>
                ` : sessionForSelectedDate.pxi ? `
                  <button onclick="window.setModalMode('logged')" style="flex: 1; padding: 16px; background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(74, 222, 128, 0.1) 100%); border: 2px solid rgba(34, 197, 94, 0.4); color: ${COLORS.success}; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px;">
                    Edit PXI
                  </button>
                  <button onclick="window.handleRemoveSession()" style="flex: 1; padding: 16px; background: rgba(239, 68, 68, 0.2); border: 2px solid rgba(239, 68, 68, 0.4); color: ${COLORS.danger}; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px;">
                    Delete
                  </button>
                ` : `
                  <button onclick="window.setModalMode('logged')" style="flex: 1; padding: 16px; background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(74, 222, 128, 0.1) 100%); border: 2px solid rgba(34, 197, 94, 0.4); color: ${COLORS.success}; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px;">
                    Log PXI
                  </button>
                  <button onclick="window.handleRemoveSession()" style="flex: 1; padding: 16px; background: rgba(239, 68, 68, 0.2); border: 2px solid rgba(239, 68, 68, 0.4); color: ${COLORS.danger}; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px;">
                    Delete
                  </button>
                `}
              </div>
            ` : `
              ${state.modalMode === 'logged' ? `
                <div style="margin-bottom: 16px;">
                  <label style="font-size: 12px; color: ${COLORS.textMuted}; font-weight: 600; display: block; margin-bottom: 8px;">
                    PXI Score
                  </label>
                  <input type="number" id="pxiInput" value="${state.inputPXI}" placeholder="Enter PXI score" style="width: 100%; padding: 12px; background: rgba(71, 85, 105, 0.3); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 8px; color: ${COLORS.text}; font-size: 16px; box-sizing: border-box;" onchange="window.updateInputPXI(this.value)" onkeydown="window.handleKeyPress(event)" />
                </div>
              ` : ''}

              <div style="display: flex; gap: 8px;">
                <button onclick="window.setModalMode(null)" style="flex: 1; padding: 12px; background: rgba(71, 85, 105, 0.3); border: 1px solid rgba(71, 85, 105, 0.4); color: ${COLORS.textMuted}; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s;">
                  Back
                </button>
                <button onclick="window.handleSaveSession()" style="flex: 1; padding: 12px; background: linear-gradient(135deg, ${COLORS.success} 0%, ${COLORS.successLight} 100%); border: none; color: #000; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s;">
                  Save
                </button>
              </div>
            `}
          </div>
        </div>
      `;

      // Re-attach event listeners after render
      setTimeout(() => {
        const pxiInput = document.getElementById('pxiInput');
        if (pxiInput) {
          pxiInput.focus();
        }
      }, 0);
    }

    // ============================================================================
    // GLOBAL WINDOW FUNCTIONS (for event handlers)
    // ============================================================================

    window.handleDateClick = handleDateClick;
    window.handlePreviousMonth = handlePreviousMonth;
    window.handleNextMonth = handleNextMonth;
    window.handleSaveSession = handleSaveSession;
    window.handleRemoveSession = handleRemoveSession;
    window.closeModal = closeModal;
    window.setModalMode = (mode) => { state.modalMode = mode; render(); };
    window.updateInputPXI = (value) => { state.inputPXI = value; };
    window.handleAddPlannedSessionFromModal = () => {
      handleAddPlannedSession(state.selectedDate);
      closeModal();
    };
    window.handleKeyPress = (e) => {
      if (e.key === 'Enter') handleSaveSession();
      if (e.key === 'Escape') closeModal();
    };

    // ============================================================================
    // INIT
    // ============================================================================

    loadSessions();
    render();
  </script>
</body>
</html>
